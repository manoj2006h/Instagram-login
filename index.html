<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram-login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="container">

            <div class="box1">
                <div class="logo">
                    <img src="images/logo.jpg" alt="instagram-logo">
                </div>
                <div class="content">
                    <div class="first-line">
                        <p>See everyday moments from your</p>
                    </div>
                    <div class="second-line">
                        <p>close friends.</p>
                    </div>
                    <div class="main-pic">
                        <img src="images/main.png" alt="main-picture">
                    </div>
                </div>

            </div>

            <div class="box2">

                <div class="heading">
                    <p>Log in to Instagram</p>
                </div>

                <div class="text-boxes">
                    <div class="mobile-no">
                        <input type="text" placeholder="Mobile number, username or email address">
                    </div>
                    <div class="password">
                        <input type="text" placeholder="Password">
                    </div>
                </div>

                <div class="first-2-btns">
                    <div class="log-in">
                        <button>Log in</button>
                    </div>
                    <div class="forgot-pass hover-color">
                        <button>Forgotten password ?</button>
                    </div>
                </div>

                <div class="next-2-btns">

                    <div class="log-in-fb hover-color">
                        <button><img src="images/fb.jpg" alt="facebook-img"> Log in with Facebook</button>
                    </div>
                    <div class="create-new-acc hover-color">
                        <button>Create new account</button>
                    </div>
                </div>
            </div>

        </div>
    </main>
</body>

</html>
